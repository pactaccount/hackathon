services:
  - type: web
    name: robin-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /health
    envVars:
      # ── LLM ──────────────────────────────────────────
      - key: LLM_PROVIDER
        value: pioneer
      - key: PIONEER_API_KEY
        sync: false
      - key: PIONEER_BASE_URL
        value: https://api.pioneer.ai/v1
      - key: PIONEER_MODEL
        value: meta-llama/Llama-3.1-8B-Instruct
      - key: PIONEER_SMART_MODEL
        value: claude-sonnet-4-6

      # ── Composio ──────────────────────────────────────
      - key: COMPOSIO_API_KEY
        sync: false

      # ── ClickHouse ────────────────────────────────────
      - key: CLICKHOUSE_HOST
        sync: false
      - key: CLICKHOUSE_PORT
        value: "8443"
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_PASSWORD
        sync: false
      - key: CLICKHOUSE_DATABASE
        value: robin

      # ── Airbyte ───────────────────────────────────────
      - key: AIRBYTE_CLIENT_ID
        sync: false
      - key: AIRBYTE_CLIENT_SECRET
        sync: false
      - key: AIRBYTE_ORGANIZATION_ID
        sync: false

      # ── App ───────────────────────────────────────────
      - key: ENVIRONMENT
        value: production
      - key: ROBIN_SECRET_KEY
        generateValue: true
