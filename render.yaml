services:
  - type: web
    name: robin-backend
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: PIONEER_API_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: CLICKHOUSE_HOST
        sync: false
      - key: CLICKHOUSE_PASSWORD
        sync: false
      - key: LLM_PROVIDER
        value: pioneer
      - key: ENVIRONMENT
        value: production
